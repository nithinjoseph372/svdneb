version: '3.8'

services:
  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: svdneb-backend
    ports:
      - "3000:3000"
    volumes:
      # Data persistence for the SQLite database
      - server-data:/app/data
      - ./server/database.sqlite:/app/database.sqlite
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: svdneb-frontend
    ports:
      - "5173:80" # Maps localhost:5173 to Nginx port 80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  server-data:
